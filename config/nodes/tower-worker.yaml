# Worker Node Configuration — Tower (Ryzen 5 + RTX 3070)
# Auto-generated by bootstrap.sh. Editable.

node_id: tower-ryzen5
role: worker
hostname: 192.168.1.101       # Update to actual LAN IP
queen_address: 192.168.1.100:9090
display_name: "Tower (Ryzen 5 + RTX 3070)"

hardware:
  cpu: "AMD Ryzen 5"
  ram_gb: 32
  gpu: "NVIDIA RTX 3070 8GB VRAM"
  storage_gb: 1000
  os: "Windows 11 Pro"

profile: nvidia-8gb-32gb-ram   # References models.json

capabilities:
  - cuda_inference      # Ollama with CUDA
  - scheduled_tasks     # Cron-equivalent (Task Scheduler on Windows)
  - docker_host         # Docker Desktop for services
  - gws_host            # Google Workspace CLI for email send + drive write
  - always_on           # This machine runs 24/7

services:
  ollama:
    host: "0.0.0.0"
    port: 11434
    enabled: true
  gws:
    command: "gws mcp"
    enabled: false      # Pending gws install + auth
  docker:
    compose_file: ~/akos/docker-compose.yml
    services: [fizzy, nats, ntfy]
    enabled: true       # Pending docker compose up

heartbeat:
  interval_seconds: 30
  queen_url: "http://192.168.1.100:9090/api/nodes/tower-ryzen5/heartbeat"

max_concurrent_tasks: 4
