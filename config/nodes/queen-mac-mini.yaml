# Queen Node Configuration — Mac Mini M4 Pro
# This file is auto-generated by bootstrap.sh and can be edited manually.
# MODULARITY: If Queen moves to a different machine, copy this file,
# update hardware specs, and promote the new node.

node_id: mac-mini-queen
role: queen
hostname: 192.168.1.100       # Update to actual LAN IP
display_name: "Mac Mini M4 Pro (Queen)"

hardware:
  cpu: "Apple M4 Pro (14-core ARM)"
  ram_gb: 24
  gpu: "Apple GPU 20-core (MLX compatible)"
  storage_gb: 512
  os: "macOS Sequoia 15.x"

profile: mac-apple-silicon-24gb   # References models.json

capabilities:
  - mlx_inference       # LM Studio with MLX models
  - qmd_search          # QMD index host + MCP server
  - mcp_host            # Hosts MCP servers (QMD, Fizzy, etc.)
  - nats_server         # NATS JetStream server (workers connect here)
  - nadirclaw_router    # NadirClaw routing gateway (Phase 2)
  - paperclip_host      # Paperclip governance (Phase 2)
  - queen_api           # Queen HTTP service (node registry, health, dashboard)
  - scheduled_tasks     # Cron-based scheduled tasks

services:
  queen_api:
    port: 9090
    enabled: true
  qmd_mcp:
    command: "qmd mcp-server"
    port: 9091
    enabled: true
  nats:
    port: 4222
    jetstream: true
    enabled: true
  fizzy_mcp:
    command: "npx fizzy-mcp"
    enabled: true       # Pending Fizzy MCP setup
  nadirclaw:
    port: 8000
    enabled: false      # Phase 2
  paperclip:
    port: 8001
    enabled: false      # Phase 2

qmd:
  collections:
    - path: ~/akos/db/ak-os
      name: ak-os-core
    - path: ~/akos/db/ak-os/entities
      name: entities
    - path: ~/akos/db/ak-os/projects/borgclaw
      name: borgclaw
    - path: ~/akos/db
      name: master-context
    - path: ~/akos/memory
      name: memory
  context_annotations:
    - collection: ak-os-core
      annotation: "AK-OS operating system: ontology, workflows, state, architecture"
    - collection: entities
      annotation: "Entity registries: people, projects, patterns, decisions, signals, financial"
    - collection: borgclaw
      annotation: "BorgClaw infrastructure: specs, research, config, agent definitions"
    - collection: master-context
      annotation: "Deep context: Alexander's identity, voice, brand, IP, master context docs"
    - collection: memory
      annotation: "Session-persistent memory: voice rules, corrections, learned patterns"

heartbeat:
  interval_seconds: 30
  max_missed: 5           # Mark offline after 5 missed (2.5 min)

max_concurrent_tasks: 3
