# BorgClaw MCP & Tool Registry
# Master inventory of all connected tools, their capabilities, and status.
#
# MODULARITY PRINCIPLE: Every entry here is a slot, not a commitment.
# The tool in the slot can be swapped at any time. What matters is the
# CAPABILITY (what it does), not the IMPLEMENTATION (which tool does it).
# When a better tool comes along, update the tool field. The agents
# query by capability, not by tool name.
#
# Agents query: "I need search_messages capability" → registry returns
# whichever tool currently fills that slot.

_last_updated: "2026-03-15"

