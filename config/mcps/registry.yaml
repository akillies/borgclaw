# ============================================================
# PENDING INSTALL (ready to connect)
# ============================================================

pending:
  - id: qmd
    capability: [semantic_search, keyword_search, reranked_search, context_lookup]
    tool: "QMD MCP Server"
    install: "npm install -g @tobilu/qmd && qmd mcp-server"
    node: queen
    status: pending_install
    replaces: [lancedb-custom-mcp]
    notes: "Built-in MCP server. Zero custom code."

  - id: fizzy
    capability: [list_cards, create_card, update_card, move_card, list_columns, webhooks]
    tool: "Fizzy MCP (Fabric-Pro/fizzy-mcp)"
    install: "npm install @silky/fizzy-mcp"
    node: queen
    status: pending_connect

  - id: gws
    capability: [gmail_send, drive_write, docs_read_write, sheets_read_write, calendar_full]
    tool: "Google Workspace CLI (@googleworkspace/cli)"
    install: "npm install -g @googleworkspace/cli && gws auth login && gws mcp"
    node: tower
    status: pending_install
    replaces: [gmail-anthropic, gdrive-anthropic, gcal-anthropic]
    notes: "First-party Google. AES-256-GCM. Replaces 3 separate MCPs with 1."

