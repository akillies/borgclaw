model_list:
  - model_name: fast-cloud
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      tier: 2
      use_for:
        - outreach-drafts
        - linkedin-posts
        - summaries
        - signal-classification
      note: 200x cheaper than Opus. Genuinely good. Use this more than you think.
  - model_name: fast-cloud-fallback
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      tier: 2
      use_for:
        - fallback-when-gemini-rate-limited
  - model_name: mid-reasoning
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      tier: 3
      use_for:
        - medium-strategic-analysis
        - complex-structured-output
  - model_name: long-context
    litellm_params:
      model: moonshot/moonshot-v1-128k
      api_key: os.environ/MOONSHOT_API_KEY
      api_base: https://api.moonshot.cn/v1
    model_info:
      tier: 3
      use_for:
        - long-document-processing
        - large-codebase-analysis
      context_window: 128000
  - model_name: voice-critical
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      tier: 4
      use_for:
        - voice-matched-writing
        - ansible-synthesis
        - brand-critical-content
      note: Not Opus. Sonnet handles voice-critical content.
  - model_name: frontier
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      tier: 4
      use_for:
        - deep-foresight
        - frontier-reasoning
      note: ~5% of total workload. Hard budget cap enforced.
  - model_name: local-phi4-mini
    litellm_params:
      model: ollama/phi4-mini
      api_base: http://:11434
    model_info:
      tier: 1
      cost_per_token: 0
      node_id: qa-test-drone-0001
      _managed_by: queen
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  fallbacks:
    - fast-cloud:
        - fast-cloud-fallback
    - local-router:
        - local-general
    - local-general:
        - fast-cloud
    - local-synthesis:
        - mid-reasoning
    - local-code:
        - local-code-sm
        - fast-cloud
    - local-code-sm:
        - fast-cloud
litellm_settings:
  max_budget: 55
  budget_duration: monthly
  cache: true
  cache_params:
    type: local
    ttl: 3600
  success_callback: []
  failure_callback: []
