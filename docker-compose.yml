# BorgClaw Docker Compose — Middleware Stack
# Run: docker compose up -d
#
# WHAT THIS STARTS (persistent services):
#   - NATS JetStream   port 4222  — event bus, agent coordination backbone
#   - ntfy             port 2586  — push notifications + approval action buttons
#   - LiteLLM          port 4000  — model-agnostic proxy (single endpoint for all providers)
#
# WHAT RUNS ON THE HOST (not Docker — installed by bootstrap.sh):
#   - Ollama           port 11434 — LLM server (MLX on Mac, CUDA on NVIDIA)
#   - NadirClaw        port 8856  — smart router (simple→local, complex→cloud)
#                                   install: pip install nadirclaw
#                                   start:   nadirclaw --port 8856 --backend http://localhost:4000
#   - Queen service    port 9090  — node registry
#                                   start:   cd services/queen && npm install && node server.js
#
# WHAT NEEDS SEPARATE SETUP (not in this compose):
#   - Fizzy task board — sign up at fizzy.do OR self-host (Rails app, separate deployment)
#                        connect agents via: FIZZY_TOKEN=<your-token> npx @silky/fizzy-mcp
#
# MODULARITY: Every service is independently swappable.
#   NATS → Redis Streams or RabbitMQ
#   ntfy → Pushover or Gotify
#   LiteLLM → direct provider SDKs (but why would you)
#
# WHY NO n8n: Workflow orchestration is handled by agent DAGs (config/workflows/*.yaml)
#   executed via LangGraph. n8n adds 500MB+ and complexity for workflows agents handle natively.
#   Add n8n back if you need 400+ integration nodes for last-mile delivery.

version: "3.8"

services:

  # ============================================================
  # NATS JetStream — Event bus + streaming + KV store
  # Every agent action emits a typed event here.
  # Agents query recent events before acting (temporal coordination).
  # Subjects: events.agent.*, events.task.*, events.node.*, events.approval.*
  # ============================================================
  nats:
    image: nats:2.10-alpine
    container_name: borgclaw-nats
    ports:
      - "4222:4222"     # Client connections
      - "8222:8222"     # HTTP monitoring dashboard
    command: >
      --jetstream
      --store_dir /data
      --max_mem_store 512MB
      --max_file_store 2GB
    volumes:
      - nats-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # LiteLLM — Model-agnostic proxy (THE routing abstraction layer)
  # Agents call ONE OpenAI-compatible endpoint: http://localhost:4000
  # LiteLLM routes to: Ollama (local) → Gemini → Qwen → Kimi → Sonnet → Opus
  # Provider changes = edit config/litellm.yaml. Zero agent code changes.
  # NadirClaw sits IN FRONT of this (on host), classifies simple/complex first.
  # ============================================================
  litellm:
    # Pinned to avoid supply chain attacks. Update manually after verifying release.
    # See: docs/SECURITY.md "Supply Chain Security" for context on the litellm PyPI incident.
    image: ghcr.io/berriai/litellm:main-v1.63.14.dev1
    container_name: borgclaw-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      nats:
        condition: service_healthy

  # ============================================================
  # ntfy — Self-hosted push notifications
  # Sends approval requests to your phone with action buttons:
  # [Approve] [Reject] [View Draft] — tap to trigger Queen API.
  # Topics: borgclaw-approvals, borgclaw-alerts, borgclaw-signals
  # ============================================================
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: borgclaw-ntfy
    ports:
      - "2586:80"
    command: serve
    environment:
      - NTFY_BASE_URL=http://localhost:2586
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-etc:/etc/ntfy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # Tailscale — Zero-config VPN mesh for the hive
  # Queen is reachable as "borgclaw-queen" across all Tailscale nodes.
  # Set TS_AUTHKEY in .env — generate at tailscale.com/admin/settings/keys.
  # Use an ephemeral key for disposable deployments, reusable key for permanents.
  # network_mode: host so Tailscale can own its own interface (tun0).
  # ============================================================
  tailscale:
    image: tailscale/tailscale:latest
    hostname: borgclaw-queen
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add: [NET_ADMIN, SYS_MODULE]
    network_mode: host
    restart: unless-stopped

  # ============================================================
  # Prometheus — Scrapes /metrics/prom on Queen (9090) and drones (9091+)
  # UI at http://localhost:9099 (mapped away from Queen's own 9090)
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: borgclaw-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9099:9090"
    restart: unless-stopped

  # ============================================================
  # Grafana — Dashboards for hive observability
  # UI at http://localhost:3000  login: admin / borgclaw
  # Add Prometheus datasource: http://prometheus:9090
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: borgclaw-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=borgclaw
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  nats-data:
    driver: local
  ntfy-cache:
    driver: local
  ntfy-etc:
    driver: local
  tailscale-data:
    driver: local

networks:
  default:
    name: borgclaw-net
